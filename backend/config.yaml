# backend/config.yaml
scan:
  interval_minutes: 60
  max_open_positions: 30        # sanity ceiling only — quality gates decide what opens
  regime_filter: true           # BTC below its 4h EMA-50 = bear regime (spot needs an exceptional score)
  # Candle/price sources, tried in order. A coin is routed to the first exchange
  # that lists it as a LIVE spot market, so coins not on Binance are still covered
  # and delisted/frozen markets (e.g. spot LIT/USDT) are skipped.
  exchanges: [binance, kucoin, kraken, gate]
  candle_timeframe: "15m"        # entry / signal timeframe
  candle_limit: 200
  htf_timeframe: "4h"            # higher timeframe for trend confluence filter
  htf_candle_limit: 100

scoring:
  pre_filter_threshold: 55       # min technical score before fetching news + calling Gemini
  signal_threshold: 75           # min total score to fire a MUST-BUY signal
  max_price_divergence_pct: 8    # reject if exchange price is >8% off CMC's price (stale/wrong coin)
  pumped_skip_pct: 30            # skip a candidate already up this % over 7 days (RIF/DASH pattern)
  news_veto_threshold: 35        # skip a candidate if grounded news sentiment is below this
  bear_signal_threshold: 80      # spot fire threshold while BTC is below its 4h trend (vs 75 normally)
  technical_weight: 0.65
  news_weight: 0.35
  min_volume_24h: 25000          # CMC server-side filter: ~2785 coins (lower = more, thinner coins)
  downtrend_penalty: 0.5         # multiply technical score if 4h is NOT in an uptrend
  indicators:
    macd_weight: 30              # momentum (gated by volume confirmation)
    rsi_weight: 20               # uptrend-aware RSI
    ema_weight: 15               # price above EMA-50 on entry timeframe
    volume_weight: 15            # volume spike confirmation
    divergence_weight: 20        # bullish MACD/price divergence

# Volatility-scaled exits: stop & trail are sized from each coin's OWN ATR at entry
# (clamped), instead of one-size-fits-all %. Once a trade peaks past trail_arm_pct,
# the decaying-ROI cap lifts and a trailing high-water exit lets the runner run —
# chandelier-style exits beat fixed ones by 26-48% profit factor in backtests.
exits:
  atr_period: 14
  atr_stop_multiplier: 2.0      # stop distance = 2 x ATR%
  stop_pct_min: 4.0
  stop_pct_max: 10.0
  atr_trail_multiplier: 1.5     # trailing give-back = 1.5 x ATR%
  trail_pct_min: 2.0
  trail_pct_max: 6.0
  trail_arm_pct: 6.0            # arm the trail once the trade has peaked past this
  # Re-entry cooldowns: don't re-buy the same coin right after a close — with the
  # windowed whale detection, the spike that just stopped out is still detectable.
  loss_cooldown_hours: 4
  reentry_cooldown_hours: 2

paper_trading:
  take_profit_pct: 10.0
  stop_loss_pct: 5.0
  max_hold_hours: 24
  notional_size: 1000.0
  # Time-decaying take-profit (minutes: target %). Grab the early pop, then accept
  # progressively less so a fading winner is booked green instead of riding to the stop.
  roi:
    0: 10.0       # +10% in the first 30 min
    30: 5.0       # after 30 min, take +5%
    120: 3.0      # after 2h, take +3%
    360: 1.5      # after 6h, take any +1.5%

# How open positions are tracked. Checking the 1m candle HIGH/LOW (not just the
# last price) catches brief intra-minute spikes that would otherwise be missed —
# e.g. a coin that touches +10% for only a minute still books the win.
tracking:
  # The tracker prices positions from CoinGecko (trusted/displayed price) and checks
  # TP/SL/timeout each cycle. One batched CoinGecko call per cycle — keep >=2s to
  # stay under CoinGecko's free-tier rate limit (raise if you see 429 warnings).
  price_feed_seconds: 3
  candle_timeframe: "1m"        # timeframe whose high/low is scanned for TP/SL touches
  candle_limit: 60

# Whale-ride strategy: catch the footprint of large players — an abnormal volume
# surge plus a sharp price thrust in the same window. Tracked as a separate
# strategy with its own positions, exits, and win/loss stats.
whale:
  enabled: true
  bypass_regime: true           # whales trade even when BTC is below its 4h trend (daily action; spot still gated)
  volume_multiple: 4.0          # spike volume >= 4x its average (follow-through confirmation now
                                # handles fakes; v1's losing faders were 3.4-3.9x, so 4x stays above)
  price_thrust_pct: 3.0         # price up >= 3% over the thrust lookback
  max_thrust_pct: 18            # reject if thrust >= this % over the lookback (blow-off top: DEGO/RAD)
  thrust_lookback: 3            # number of candles for the price-thrust window
  detect_window: 7              # search the last N candles for a spike (hourly scans miss
                                # mid-hour spikes otherwise); needs >=1 candle of follow-through
  take_profit_pct: 15.0
  stop_loss_pct: 7.0
  max_hold_hours: 12
  # Whales fade fastest — decay the target hard so you bank the thrust early.
  roi:
    0: 15.0       # +15% in the first 20 min
    20: 7.0       # after 20 min, take +7%
    60: 4.0       # after 1h, take +4%
    180: 2.0      # after 3h, take any +2%
  # Entry-quality filters — fewer but higher-conviction whale rides:
  ema_period: 20                # only ride a thrust while price is above this EMA (skip downtrend bounces)
  min_candle_volume_usd: 10000  # the spike candle must move >= this much $ (kills dead-coin noise)
  max_single_candle_pct: 15     # skip if the latest candle alone jumped >= this % (blow-off top)
