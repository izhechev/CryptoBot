# backend/config.yaml
scan:
  interval_minutes: 30
  exchange: binance
  candle_timeframe: "15m"
  candle_limit: 200

scoring:
  pre_filter_threshold: 60
  signal_threshold: 80
  technical_weight: 0.65
  news_weight: 0.35
  indicators:
    macd_weight: 35
    rsi_weight: 25
    ema_weight: 20
    volume_weight: 20

paper_trading:
  take_profit_pct: 10.0
  stop_loss_pct: 5.0
  max_hold_hours: 24
  notional_size: 1000.0
